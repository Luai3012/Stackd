<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — Stackd</title>
  <meta name="description" content="Get help with Stackd. FAQs, guides, and contact information." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231D9E75'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-size='18' font-family='system-ui' font-weight='600' fill='white'>S</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css" />
  <style>
    .page { max-width: 720px; margin: 0 auto; padding: 4rem 2rem; }
    .page-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--green); margin-bottom: 0.75rem; }
    .page-title { font-family: var(--font-display); font-size: 40px; font-weight: 700; letter-spacing: -1px; margin-bottom: 0.5rem; }
    .page-sub { font-size: 16px; color: var(--text-2); margin-bottom: 3rem; }
    .faq-group { margin-bottom: 2.5rem; }
    .faq-group-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 0.5px solid var(--border); color: var(--text); }
    .faq-item { margin-bottom: 1.5rem; }
    .faq-q { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .faq-a { font-size: 14px; color: var(--text-2); line-height: 1.7; }
    .faq-a a { color: var(--green); text-decoration: none; }
    .contact-card { background: var(--surface); border: 0.5px solid var(--border-green); border-radius: var(--radius-xl); padding: 2.5rem; text-align: center; margin-top: 3rem; }
    .contact-card h2 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin-bottom: 0.5rem; }
    .contact-card p { font-size: 14px; color: var(--text-2); margin-bottom: 1.5rem; }
    @media(max-width:768px){ .page { padding: 2rem 1.25rem; } .page-title { font-size: 28px; } }
  </style>
</head>
<body>
<div class="cursor-dot" id="c-dot"></div>
<div class="cursor-ring" id="c-ring"></div>
<script>
(function(){
  var d=document.getElementById("c-dot"),r=document.getElementById("c-ring");
  if(!d||!r||window.matchMedia("(hover:none),(pointer:coarse)").matches)return;
  var mx=window.innerWidth/2,my=window.innerHeight/2,rx=mx,ry=my;
  document.addEventListener("mousemove",function(e){mx=e.clientX;my=e.clientY;});
  (function tick(){
    d.style.left=mx+"px";d.style.top=my+"px";
    rx+=(mx-rx)*0.1;ry+=(my-ry)*0.1;
    r.style.left=rx+"px";r.style.top=ry+"px";
    requestAnimationFrame(tick);
  })();
  document.querySelectorAll("a,button").forEach(function(el){
    el.addEventListener("mouseenter",function(){r.classList.add("ring-hover");d.classList.add("dot-hover");});
    el.addEventListener("mouseleave",function(){r.classList.remove("ring-hover");r.classList.remove("dot-hover");});
  });
})();
</script>
</body>
</html>
